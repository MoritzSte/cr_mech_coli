# Fit configuration — fluorescence
# =========================================================================
# Modality-specific defaults for `crm_gen fit` against fluorescence
# microscopy images.  Layout is identical to default_fit_config.toml;
# overrides reflect calibration analysis of past FL runs:
#   - psf_sigma upper-bound trimmed (fl-cex-cyto pinned at 0.21).
#   - texture_strength always collapses to ~0 → tighten.
#   - bg_base_brightness upper-bound trimmed (FL bg is near-black).
#   - defocus_strength trimmed (3.0 was unphysical).
#   - LPIPS weight halved — perceptual loss is dominated by bg noise in FL.
#   - region_weights drops edge_band to ~0 — FL has no halo / edge fringe,
#     so the boundary band carries no special signal.
#
# Mode-gating drops halo, absorption, edge_fringe entirely (see
# parameter_registry.applies_to) so the FL fit naturally has the smallest
# active set.

imaging_mode = "fluorescence"

[optimization]
output_dir = ""
limit = 15
n_vertices = 8
maxiter = 50
popsize = 15
tol = 0.02
workers = -1
seed = 0
resume = false
resume_dir = ""
no_checkpoint = false
save_all_synthetics = true
warm_start_samples = 200

[optimization.metric_weights]
histogram_distance = 0.01
ssim = 1.0
ms_ssim = 1.0
gradient_ssim = 1.0
lpips = 0.5                             # halved — perceptual loss dominated by bg noise in FL
power_spectrum = 0.0

[optimization.region_weights]
# FL has no halo / edge fringe — edge band carries no special signal.
background = 0.45
foreground = 0.45
foreground_sigma_px = 30.0
edge_band = 0.10
edge_sigma_px = 2.0

[optimization.bounds]
# Tightened per-modality bounds.  Pin with [X, X] to remove a param from DE.
psf_sigma                 = [0.1,   1.0  ]   # was [0.1, 3]; fl-cex-cyto pinned at 0.21
texture_strength          = [0.0,   0.02 ]   # was [0, 0.1]; always collapses to ~0
bg_base_brightness        = [0.0,   0.2  ]   # was [0, 0.6]; FL bg is near-black
defocus_strength          = [0.0,   1.0  ]   # was [0, 3]; 3.0 unphysical

[screening]
num_trajectories = 40
morris_top_n = 10
run_sobol = true
sobol_n_samples = 256
sobol_top_n = 7
num_screening_images = 20
use_best_values = false
use_groups = true
use_baseline_filter = true
baseline_improvement_rate_threshold = 0.05
baseline_improvement_epsilon = 0.01

[screening.coarse_prefit]
enabled = true
dominant_params = ["bg_base_brightness"]
maxiter = 10
popsize = 5
