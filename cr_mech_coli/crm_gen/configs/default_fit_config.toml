# Default Fit Configuration for crm_gen
# =========================================================================
# Controls the optimisation hyperparameters for `crm_gen fit`.
# The input directory of real microscope images is passed as a CLI argument.

[optimization]
output_dir = ""                         # Output directory (empty = ./fit_results_<timestamp>)
limit = 0                               # Maximum number of images to use (0 = all)
n_vertices = 8                          # Number of vertices per cell for shape extraction
maxiter = 50                            # Maximum differential evolution iterations
popsize = 15                            # Population size multiplier (population = popsize * num_params)
workers = -1                            # Number of worker processes (-1 = all CPUs, 1 = sequential)
seed = 42                               # Random seed for reproducibility
resume = false                          # Resume from latest checkpoint
resume_dir = ""                         # Directory of previous run to resume (required if resume = true)
no_checkpoint = false                   # Disable checkpointing
save_all_synthetics = true              # Generate synthetic images for all pairs after optimisation

[optimization.metric_weights]
histogram_distance = 0.01               # Weight for histogram L1 distance
ssim = 1.0                              # Weight for SSIM (structural similarity)
psnr = 0.02                             # Weight for PSNR (peak signal-to-noise ratio)
ms_ssim = 1.0                           # Weight for Multi-Scale SSIM (0 = disabled)
power_spectrum = 0.0                    # Weight for power spectrum distance (0 = disabled)

[optimization.region_weights]
background = 0.65                       # Weight for background region loss
foreground = 0.35                       # Weight for foreground region loss

[optimization.bounds]
# Search bounds [min, max] for each imaging parameter during optimisation.
# These define the space explored by differential evolution.
# Parameters not listed here fall back to registry defaults.
bg_base_brightness      = [0.0,   0.6  ]   # Background base brightness
bg_gradient_strength    = [0.0,   0.04 ]   # Illumination gradient intensity
bg_noise_scale          = [1,     25   ]   # Background illumination noise scale
texture_strength        = [0.0,   0.1  ]   # Fine texture strength
texture_scale           = [0.5,   5.0  ]   # Texture smoothness
bg_blur_sigma           = [0.1,   3.0  ]   # Background blur sigma
dark_spot_intensity     = [0.0,   0.3  ]   # Dark spot intensity
num_dark_spots_max      = [0,     20   ]   # Maximum dark spots
bac_halo_intensity      = [0.0,   0.6  ]   # Halo intensity around bacteria
halo_inner_width        = [0.5,   5.0  ]   # Inner halo width (pixels)
halo_outer_width        = [5.0,   100.0]   # Outer halo width (pixels)
halo_blur_sigma         = [0.1,   3.0  ]   # Halo blur sigma
psf_sigma               = [0.1,   3.0  ]   # Point Spread Function blur sigma
psf_size                = [5,     21   ]   # PSF kernel size (odd integer)
peak_signal             = [500,   10000]   # Peak photon count (Poisson noise)
gaussian_sigma          = [0.001, 0.05 ]   # Gaussian readout noise sigma
brightness_noise_strength = [0.0, 0.5  ]   # Intra-cell brightness variation
# Brightfield / general optical parameters (inactive at default 0.0)
absorption_coeff          = [0.0,   2.0  ]   # Beer-Lambert absorption coefficient
cell_optical_thickness    = [0.5,   10.0 ]   # Maximum optical thickness at cell center
defocus_strength          = [0.0,   3.0  ]   # Defocus blur strength (extra sigma)
defocus_scale             = [1,     25   ]   # Spatial scale of z-variation field
vignette_strength         = [0.0,   0.5  ]   # Radial intensity falloff strength
edge_fringe_intensity     = [0.0,   0.1  ]   # Edge diffraction fringe intensity
edge_fringe_width         = [0.5,   4.0  ]   # Edge diffraction fringe width (px)

# =========================================================================
# Screening configuration — used by `crm_gen screen` and `crm_gen fit --auto-screen`
# =========================================================================

[screening]
num_trajectories = 10                   # Number of Morris trajectories
morris_top_n = 10                       # Keep top N params after Morris screening
run_sobol = true                        # Run Sobol analysis after Morris
sobol_n_samples = 128                   # Sobol base sample size (N)
sobol_top_n = 7                         # Keep top N params after Sobol analysis
num_screening_images = 20               # Number of representative images for screening
use_best_values = false                 # Fix inactive params to best values found during screening (false = registry defaults)
