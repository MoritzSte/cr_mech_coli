# Fit configuration — brightfield
# =========================================================================
# Modality-specific defaults for `crm_gen fit` against brightfield
# microscopy images.  Layout is identical to default_fit_config.toml;
# overrides reflect calibration analysis of past BF runs:
#   - (absorption_coeff, cell_optical_thickness) is unidentifiable
#     (Beer-Lambert product).  cell_optical_thickness is PINNED at 3.0
#     so absorption_coeff is the single free knob controlling darkness.
#     See parameter_registry.py docstring + filters.py for context.
#   - absorption_coeff lower-bound raised so DE can't drift toward the
#     degenerate "absorption ≈ 0, thickness ≈ max" attractor.
#   - psf_sigma / defocus_strength tightened (3.0 was unphysical).
#   - texture_strength / texture_scale tightened (always pinned near 0).
#   - region_weights shifts foreground up — BF mode-gating regressed on
#     foreground SSIM, so put pressure there.
#
# BF needs the most compute of the three modalities; consider raising
# popsize/maxiter further if convergence is tight.

imaging_mode = "brightfield"

[optimization]
output_dir = ""
limit = 15
n_vertices = 8
maxiter = 60                            # BF benefits from a few more iterations
popsize = 15
tol = 0.02
workers = -1
seed = 0
resume = false
resume_dir = ""
no_checkpoint = false
save_all_synthetics = true
warm_start_samples = 200

[optimization.metric_weights]
histogram_distance = 0.01
ssim = 1.0
ms_ssim = 1.0
gradient_ssim = 1.0
lpips = 1.0
power_spectrum = 0.5                    # matches the BF mode-gating cluster runs

[optimization.region_weights]
# BF mode-gating regressed on foreground SSIM → push fg weight up.
background = 0.30
foreground = 0.45
foreground_sigma_px = 30.0
edge_band = 0.25
edge_sigma_px = 2.0

[optimization.bounds]
# Pin with [X, X] to remove a param from DE entirely.
bg_base_brightness        = [0.3,   0.7  ]   
absorption_coeff          = [0.0,   0.0  ]   # PINNED — brightness is modelled via bacteria brightness mode "original" + bg_base_brightness, not absorption.  This is to avoid the absorption × thickness degeneracy.
cell_optical_thickness    = [3.0,   3.0  ]   # PINNED — breaks the absorption × thickness redundancy
psf_sigma                 = [0.6,   1.8  ]   # carries all blur (BF psf fits were ~0.2)
defocus_strength          = [0.0,   0.3  ]   # in-focus calibration set
edge_fringe_intensity     = [0.4,   0.4  ]   
edge_fringe_width         = [2.5,   2.5  ]

[screening]
num_trajectories = 40
morris_top_n = 10
run_sobol = true
sobol_n_samples = 256
sobol_top_n = 7
num_screening_images = 20
use_best_values = false
use_groups = true
use_baseline_filter = true
baseline_improvement_rate_threshold = 0.05
baseline_improvement_epsilon = 0.01

[screening.coarse_prefit]
enabled = true
dominant_params = ["bg_base_brightness"]
maxiter = 10
popsize = 5
